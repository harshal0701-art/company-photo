name: Employee Photo Processing Pipeline

on:
  push:
    paths:
      - 'photos/**' # Triggers automatically when an image is pushed to the photos folder

jobs:
  analyze-photo:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows pushing the updated result.json back to your repo

    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Upload and Face Detection Script
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        AWS_S3_BUCKET: "company-employee-photo" # Your specified bucket name
      run: python upload_and_detect.py

    - name: Commit and Push result.json back to GitHub
      run: |
        git config --local user.email "chaudhariharshal551@gmail.com"
        git config --local user.name "harshal0701-art"
        git add result.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: result.json [skip ci]" && git push)